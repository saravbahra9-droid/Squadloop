    <title>SquadLoop UAE — Book Every After-School Activity in Dubai</title>

    <!-- Open Graph -->
    <meta property="og:site_name" content="SquadLoop UAE" />
    <meta property="og:title" content="SquadLoop UAE — Every Activity. One Platform." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SquadLoop UAE — Every Activity. One Platform." />
    <meta name="twitter:description" content="Discover, book, and manage every after-school activity in Dubai from one premium app. Launching late 2026." />
    <meta name="twitter:image" content="https://squadloop.ae/logo.png" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; scroll-padding-top: 80px; -webkit-text-size-adjust: 100%; }
      body { margin: 0; padding: 0; background: #08121F; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
      :focus-visible { outline: 2px solid #C8A84B; outline-offset: 2px; border-radius: 4px; }
      ::selection { background: rgba(200,168,75,0.3); }
      @keyframes slStarIn {
        0%   { opacity: 0; transform: translate(52px, -40px) scale(0.15) rotate(-140deg); }
        65%  { opacity: 1; transform: translate(-4px, 3px) scale(1.18) rotate(10deg); }
        100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0); }
      }

      /* ===== Cinematic start-screen intro (mirrors the SquadLoop app) ===== */
      #sl-intro {
        position: fixed; inset: 0; z-index: 4000; display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: opacity 0.6s ease;
        background:
          radial-gradient(560px 400px at 76% 14%, rgba(200,168,75,0.14), transparent 70%),
          radial-gradient(520px 380px at 12% 76%, rgba(36,70,120,0.40), transparent 72%),
          #08121F;
      }
      #sl-intro.bye { opacity: 0; pointer-events: none; }
      .sl-intro-inner { transition: transform 0.6s ease; }
      #sl-intro.bye .sl-intro-inner { transform: translateY(-16px) scale(0.96); }
      .sl-glow {
        position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(2px); opacity: 0;
        background: radial-gradient(circle, rgba(200,168,75,0.22), transparent 65%);
        animation: slGlow 2.3s ease forwards;
      }
      @keyframes slGlow { 0% { opacity: 0; transform: scale(0.6); } 30% { opacity: 1; } 100% { opacity: 0.55; transform: scale(1.15); } }
      .sl-intro-inner { display: flex; flex-direction: column; align-items: center; position: relative; }
      .sl-istar {
        width: 46px; height: 46px; color: #C8A84B; opacity: 0;
        transform: scale(0.4) rotate(-100deg); filter: drop-shadow(0 0 14px rgba(200,168,75,0.55));
        animation: slIStar 0.85s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      }
      @keyframes slIStar { to { opacity: 1; transform: scale(1) rotate(0deg); } }
      .sl-iword {
        font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500;
        font-size: clamp(42px, 12vw, 66px); white-space: nowrap; margin-top: 14px; overflow: hidden;
      }
      .sl-iword .t { display: inline-block; opacity: 0; transform: translateY(105%); letter-spacing: 0.16em;
        animation: slIWord 1s cubic-bezier(0.22,1,0.36,1) 0.4s forwards; }
      @keyframes slIWord { 60% { opacity: 1; } 100% { opacity: 1; transform: translateY(0); letter-spacing: 0.02em; } }
      .sl-iword .sq { color: #F9F6EF; } .sl-iword .lo { color: #C8A84B; }
      .sl-irule { height: 1px; width: 0; margin-top: 18px; background: linear-gradient(90deg, transparent, #EDD98A, transparent);
        animation: slIRule 0.7s ease 0.95s forwards; }
      @keyframes slIRule { to { width: min(160px, 46vw); } }
      .sl-itag { margin-top: 15px; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
        color: rgba(249,246,239,0.5); opacity: 0; animation: slITag 0.6s ease 1.2s forwards; }
      @keyframes slITag { to { opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        #sl-intro { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
